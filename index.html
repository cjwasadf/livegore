<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VAULT</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --surface: #111; --surface2: #181818;
      --border: #1f1f1f; --accent: #c8ff47; --accent-dim: rgba(200,255,71,0.12);
      --text: #efefef; --muted: #4a4a4a; --muted2: #2a2a2a;
    }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.15em; color: var(--accent); }
    .subtitle { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }

    .main { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 65px); }
    .player-side { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .video-wrap { position: relative; background: #000; aspect-ratio: 16/9; width: 100%; max-height: 65vh; overflow: hidden; }
    video { width: 100%; height: 100%; object-fit: contain; display: block; }

    .error-state { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 0.6rem; color: var(--muted); background: #000; }
    .error-state.show { display: flex; }
    .error-state .icon { font-size: 2.5rem; opacity: 0.3; }
    .error-state p { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.5; }

    .controls { background: var(--surface); border-top: 1px solid var(--border); padding: 0.75rem 1.2rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .progress-wrap { width: 100%; height: 3px; background: var(--muted2); border-radius: 2px; cursor: pointer; transition: height 0.15s; }
    .progress-wrap:hover { height: 5px; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; pointer-events: none; transition: width 0.1s linear; }
    .ctrl-row { display: flex; align-items: center; gap: 0.8rem; }
    .btn { background: none; border: none; color: var(--text); cursor: pointer; padding: 0.25rem; font-size: 1rem; opacity: 0.7; transition: opacity 0.15s, color 0.15s; line-height: 1; }
    .btn:hover { opacity: 1; color: var(--accent); }
    .vol-wrap { display: flex; align-items: center; gap: 0.4rem; }
    .vol-slider { -webkit-appearance: none; width: 65px; height: 2px; background: var(--muted2); outline: none; cursor: pointer; border-radius: 2px; }
    .vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .now-playing { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }
    .time-disp { font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.08em; color: var(--muted); margin-left: auto; }

    .playlist-side { width: 280px; flex-shrink: 0; border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
    .playlist-header { padding: 1rem 1.2rem 0.8rem; border-bottom: 1px solid var(--border); display: flex; align-items: baseline; gap: 0.6rem; flex-shrink: 0; }
    .playlist-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.15em; color: var(--text); }
    .count-badge { font-size: 0.7rem; color: var(--muted); background: var(--muted2); padding: 0.1rem 0.5rem; border-radius: 20px; }
    .playlist-list { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
    .playlist-list::-webkit-scrollbar { width: 4px; }
    .playlist-list::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

    .playlist-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.75rem 1.2rem; cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; }
    .playlist-item:hover { background: var(--surface2); }
    .playlist-item.active { background: var(--accent-dim); border-left-color: var(--accent); }
    .item-num { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; color: var(--muted); min-width: 22px; text-align: center; }
    .playlist-item.active .item-num { color: var(--accent); }
    .item-name { font-size: 0.82rem; font-weight: 500; color: var(--text); }
    .playlist-item.active .item-name { color: var(--accent); }

    @media (max-width: 640px) {
      .playlist-side { width: 100%; border-left: none; border-top: 1px solid var(--border); }
      .main { flex-direction: column; height: auto; overflow: auto; }
      .video-wrap { max-height: 40vh; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">VAULT</div>
  <div class="subtitle">강의 영상 플레이어</div>
</div>

<div class="main">
  <div class="player-side">
    <div class="video-wrap">
      <video id="video" autoplay></video>
      <div class="error-state" id="errorState">
        <div class="icon">⚠️</div>
        <p>영상 파일을 불러올 수 없습니다</p>
        <p style="font-size:0.65rem; margin-top:0.3rem; opacity:0.35;">파일이 같은 폴더에 있는지 확인하세요</p>
      </div>
    </div>
    <div class="controls">
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="ctrl-row">
        <button class="btn" id="prevBtn">⏮</button>
        <button class="btn" id="playBtn">▶</button>
        <button class="btn" id="nextBtn">⏭</button>
        <div class="vol-wrap">
          <button class="btn" id="muteBtn">🔊</button>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.05" value="1"/>
        </div>
        <span class="now-playing" id="nowPlaying">—</span>
        <span class="time-disp" id="timeDisp">0:00 / 0:00</span>
      </div>
    </div>
  </div>

  <div class="playlist-side">
    <div class="playlist-header">
      <h2>PLAYLIST</h2>
      <span class="count-badge" id="countBadge">0</span>
    </div>
    <div class="playlist-list" id="playlistList"></div>
  </div>
</div>

<script>
  // ✅ 영상 추가/수정은 여기서!
  const playlist = [
    { title: "강의 1", file: "lecture1.mp4" },
    { title: "강의 2", file: "lecture2.mp4" },
    { title: "강의 3", file: "lecture3.mp4" },
    // 추가 예시: { title: "강의 4", file: "lecture4.mp4" },
  ];

  const video = document.getElementById('video');
  const playBtn = document.getElementById('playBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const muteBtn = document.getElementById('muteBtn');
  const volSlider = document.getElementById('volSlider');
  const progressFill = document.getElementById('progressFill');
  const progressWrap = document.getElementById('progressWrap');
  const timeDisp = document.getElementById('timeDisp');
  const nowPlaying = document.getElementById('nowPlaying');
  const playlistList = document.getElementById('playlistList');
  const countBadge = document.getElementById('countBadge');
  const errorState = document.getElementById('errorState');

  let currentIndex = 0;

  function formatTime(s) {
    if (isNaN(s)) return '0:00';
    return Math.floor(s/60) + ':' + Math.floor(s%60).toString().padStart(2,'0');
  }

  function playVideo(index) {
    if (index < 0 || index >= playlist.length) return;
    currentIndex = index;
    errorState.classList.remove('show');
    video.src = playlist[index].file;
    video.play().catch(() => {});
    playBtn.textContent = '⏸';
    nowPlaying.textContent = playlist[index].title;
    renderPlaylist();
  }

  function renderPlaylist() {
    playlistList.innerHTML = '';
    countBadge.textContent = playlist.length;
    playlist.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'playlist-item' + (i === currentIndex ? ' active' : '');
      el.innerHTML = `<span class="item-num">${i === currentIndex ? '▶' : i+1}</span><span class="item-name">${item.title}</span>`;
      el.addEventListener('click', () => playVideo(i));
      playlistList.appendChild(el);
    });
  }

  playBtn.addEventListener('click', () => {
    if (video.paused) { video.play(); playBtn.textContent = '⏸'; }
    else { video.pause(); playBtn.textContent = '▶'; }
  });
  prevBtn.addEventListener('click', () => { if (currentIndex > 0) playVideo(currentIndex - 1); });
  nextBtn.addEventListener('click', () => { if (currentIndex < playlist.length - 1) playVideo(currentIndex + 1); });
  video.addEventListener('ended', () => {
    if (currentIndex < playlist.length - 1) playVideo(currentIndex + 1);
    else playBtn.textContent = '▶';
  });
  video.addEventListener('error', () => errorState.classList.add('show'));
  muteBtn.addEventListener('click', () => {
    video.muted = !video.muted;
    muteBtn.textContent = video.muted ? '🔇' : '🔊';
  });
  volSlider.addEventListener('input', () => {
    video.volume = volSlider.value;
    muteBtn.textContent = volSlider.value == 0 ? '🔇' : '🔊';
  });
  video.addEventListener('timeupdate', () => {
    const pct = video.duration ? (video.currentTime / video.duration) * 100 : 0;
    progressFill.style.width = pct + '%';
    timeDisp.textContent = formatTime(video.currentTime) + ' / ' + formatTime(video.duration);
  });
  progressWrap.addEventListener('click', e => {
    if (!video.duration) return;
    const r = progressWrap.getBoundingClientRect();
    video.currentTime = ((e.clientX - r.left) / r.width) * video.duration;
  });
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); playBtn.click(); }
    if (e.code === 'ArrowRight') video.currentTime = Math.min(video.duration||0, video.currentTime+5);
    if (e.code === 'ArrowLeft') video.currentTime = Math.max(0, video.currentTime-5);
  });

  renderPlaylist();
  playVideo(0);
</script>
</body>
</html>
